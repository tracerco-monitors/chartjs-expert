name: Claude Automated PR Review

on:
  # Using pull_request (not pull_request_target) for security:
  # - pull_request_target exposes secrets to fork PRs, creating exfiltration risk
  # - For fork PRs needing review, maintainers can manually @claude via claude.yml
  pull_request:
    types: [opened, synchronize, ready_for_review]

# Cancel any in-progress review for the same PR when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip bots and draft PRs
    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'claude[bot]' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write  # Required by claude-code-action for PR comments (GitHub API treats PR comments as issue comments)
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Review PR with Claude
        uses: anthropics/claude-code-action@fefa07e9c665b7320f08c3b525980457f22f58aa # v1.0.111
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            Review this pull request for the chartjs-expert Claude Code plugin.

            ## Context
            - Repository: ${{ github.repository }}
            - PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}
            - Author: ${{ github.event.pull_request.user.login }}

            ## Instructions
            1. Get the PR diff to understand what changed
            2. Run linters on changed files:
               - If any `.md` files were changed, run `npx markdownlint-cli2 <files>`
               - If any `.html` files were changed, run `npx htmlhint <files>`
               - If any `.yml`/`.yaml` files were changed, run `pipx run yamllint==1.37.1 -c .yamllint.yml <files>`
            3. Review the changes against the criteria below
            4. Post a summary comment with your findings

            ## Review Criteria

            ### Plugin Components (if changed)
            - **Commands** (`commands/**/*.md`): Verify YAML frontmatter has name, description, allowed-tools. Check for imperative voice ("Do X" not "You should do X").
            - **Skills** (`skills/*/SKILL.md`): Check trigger phrases in description, progressive disclosure pattern (name and description required in frontmatter; version is optional).
            - **Agents** (`agents/*.md`): Verify <example> blocks for triggering, appropriate tool restrictions.

            ### Markdown Quality (run markdownlint)
            Run `npx markdownlint-cli2` on changed `.md` files. Key rules enforced:
            - ATX-style headers (`#` not underlines)
            - Dash-style lists (`-` not `*` or `+`)
            - 2-space indentation for nested lists
            - Fenced code blocks (not indented)
            Include any lint errors in your review under a "Markdown Linting" section.

            ### HTML Quality (run htmlhint)
            Run `npx htmlhint` on changed `.html` files (Chart.js examples in `skills/**/examples/`). Key rules:
            - Tag pairs must match (no unclosed tags)
            - Attribute values use double quotes
            - Images require `alt` attributes
            - Special characters escaped (`<` → `&lt;`)
            Include any lint errors in your review under an "HTML Linting" section.

            ### YAML Quality (run yamllint)
            Run `pipx run yamllint==1.37.1 -c .yamllint.yml` on changed `.yml`/`.yaml` files. Key rules:
            - 2-space indentation
            - No trailing whitespace
            - Newline at end of file
            Include any lint errors in your review under a "YAML Linting" section.

            ### Documentation
            - README.md updates if user-facing changes
            - CLAUDE.md updates if development process changes

            ## Output Format
            Post a PR comment with your review. Structure it as:
            1. **Summary**: One-line assessment (looks good / needs changes / has concerns)
            2. **What's Good**: Positive aspects of the PR
            3. **Suggestions**: Improvements or issues found (if any)
            4. **Checklist Verification**: Confirm key items are addressed

            Be constructive and helpful. Focus on significant issues, not nitpicks.
            If the PR looks good, say so briefly - don't invent problems.
          claude_args: |
            --allowedTools "Bash(gh pr:*),Bash(npx markdownlint-cli2:*),Bash(npx htmlhint:*),Bash(pipx run yamllint:*),Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment"
